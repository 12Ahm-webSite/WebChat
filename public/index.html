<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalChat — غرف محادثة خاصة</title>
  <meta name="description" content="غرف محادثة خاصة بالمتصفح — نص، صوت، وفيديو. بدون تسجيل، مشفرة، ومجانية.">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <!-- Lobby -->
    <section id="lobby" class="lobby">
      <div class="brand animate-fade-in">
        <div class="brand-mark">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <h1>LocalChat</h1>
          <p>غرف محادثة خاصة — نص، صوت، وفيديو</p>
        </div>
      </div>

      <form id="lobbyForm" class="lobby-card animate-slide-up">
        <label for="usernameInput">اسم المستخدم</label>
        <input id="usernameInput" type="text" name="username" placeholder="أدخل اسمك" autocomplete="name" required>

        <label>اختر غرفة</label>
        <div id="roomCards" class="room-cards">
          <!-- Filled by JS -->
        </div>
        <input id="roomInput" type="hidden" name="room">

        <div id="passwordSection" class="password-section hidden">
          <label for="passwordInput">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            كلمة المرور <span class="optional-badge">اختياري</span>
          </label>
          <input id="passwordInput" type="password" name="password" placeholder="أدخل كلمة المرور (اتركه فاضي للدخول بدون)" autocomplete="off">
        </div>

        <div id="lobbyError" class="form-error" aria-live="polite"></div>

        <div class="lobby-actions">
          <button id="joinRoomBtn" type="submit" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            انضم للغرفة
          </button>
        </div>
      </form>

      <div class="lobby-features animate-slide-up-delay">
        <div class="feature-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          مشفّر
        </div>
        <div class="feature-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          بدون تسجيل
        </div>
        <div class="feature-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          خاص وآمن
        </div>
      </div>
    </section>

    <!-- Room View -->
    <section id="roomView" class="room-view hidden">
      <header class="room-header">
        <div class="room-header-info">
          <span class="room-icon" id="roomIcon">🌐</span>
          <div>
            <p class="eyebrow">غرفة</p>
            <h2 id="roomName">-</h2>
          </div>
        </div>
        <div class="room-header-user">
          <div class="user-avatar-small" id="headerAvatar">U</div>
          <div>
            <p class="eyebrow">مسجل كـ</p>
            <h3 id="currentUsername">-</h3>
          </div>
        </div>
        <div class="encryption-badge" id="encryptionBadge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          مشفّر E2E
        </div>
      </header>

      <section class="video-grid" id="videoGrid" aria-label="المشاركون بالفيديو">
        <article class="video-tile local-tile" id="localTile">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="video-label">
            <div class="video-name">أنت</div>
            <div class="video-status"></div>
          </div>
        </article>
      </section>

      <aside class="side-panel">
        <section class="panel-section">
          <div class="panel-title-row">
            <h3>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              المشاركون
            </h3>
            <span id="participantCount">0</span>
          </div>
          <ul id="participantsList" class="participants-list"></ul>
        </section>

        <section class="panel-section chat-panel">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            المحادثة
          </h3>
          <div id="messages" class="messages" aria-live="polite"></div>
          <form id="chatForm" class="chat-form">
            <input id="messageInput" type="text" placeholder="اكتب رسالة..." autocomplete="off">
            <button type="submit" title="إرسال">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </form>
        </section>
      </aside>

      <footer class="controls" aria-label="أزرار التحكم">
        <button id="toggleMicBtn" type="button" class="control-button" title="المايكروفون">
          <svg class="icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <svg class="icon-off hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="btn-label">مايك</span>
        </button>
        <button id="toggleCameraBtn" type="button" class="control-button" title="الكاميرا">
          <svg class="icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <svg class="icon-off hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.16 3.47a.5.5 0 0 1 .84.36v16.34a.5.5 0 0 1-.84.36L11 16H5a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h6l5.16-4.53z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
          <span class="btn-label">كاميرا</span>
        </button>
        <button id="toggleRecordBtn" type="button" class="control-button" title="تسجيل">
          <span class="record-dot hidden" id="recordDot"></span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
          <span class="btn-label">تسجيل</span>
        </button>
        <button id="leaveRoomBtn" type="button" class="control-button danger" title="مغادرة">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="btn-label">مغادرة</span>
        </button>
      </footer>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
